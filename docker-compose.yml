version: '3.8'

services:
  agent-shell-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-shell-api
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      # Development: bind mount for hot reload
      - ./runtime:/app/runtime
      - ./scripts:/app/scripts
      - ./.runtime-store:/app/.runtime-store
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Development service with live reload
  agent-shell-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-shell-api-dev
    ports:
      - "8001:8000"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    volumes:
      - ./:/app
    command: agent-shell-api --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    profiles:
      - dev
    restart: unless-stopped
