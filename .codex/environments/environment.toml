# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "agent-shell"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

ROOT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

# ---- ENV VARS ----
export AGENT_WORKSPACE_ROOT="$ROOT_DIR"
export AGENT_SRC_ROOT="$ROOT_DIR/app"
export AGENT_WORKTREE_ROOT="$ROOT_DIR/.worktrees"
export AGENT_RUNTIME_ROOT="$ROOT_DIR/runtime"
export AGENT_ARTIFACT_ROOT="$ROOT_DIR/artifacts"
export AGENT_LOG_ROOT="$ROOT_DIR/logs"

# MCP / A2A
export MCP_TRANSPORT="stdio"
export MCP_TIMEOUT_MS=30000
export MCP_MAX_CONCURRENCY=8

# Execution
export AGENT_EXEC_MODE="realtime"
export AGENT_DEBUG="${AGENT_DEBUG:-0}"

# Python
export PYTHONPATH="$ROOT_DIR:$ROOT_DIR/app"

# Create dirs
mkdir -p \
  "$AGENT_SRC_ROOT" \
  "$AGENT_WORKTREE_ROOT" \
  "$AGENT_RUNTIME_ROOT" \
  "$AGENT_ARTIFACT_ROOT" \
  "$AGENT_LOG_ROOT"

# ---- PLATFORM DETECTION ----
OS="$(uname | tr '[:upper:]' '[:lower:]')"

if [[ "$OS" == *"mingw"* || "$OS" == *"msys"* ]]; then
    echo "[env] Windows detected"
    export AGENT_PLATFORM="windows"
elif [[ "$OS" == *"linux"* ]]; then
    echo "[env] Linux detected"
    export AGENT_PLATFORM="linux"
else
    echo "[env] Unknown platform: $OS"
    export AGENT_PLATFORM="unknown"
fi

# ---- VENV ----
if [ ! -d ".venv" ]; then
    python3 -m venv .venv
fi

# Cross-platform activate
if [ -f ".venv/bin/activate" ]; then
    source .venv/bin/activate
elif [ -f ".venv/Scripts/activate" ]; then
    source .venv/Scripts/activate
fi

pip install --upgrade pip
pip install -e .

# ---- WRITE .env ----
cat > .env <<EOF
AGENT_WORKSPACE_ROOT=$AGENT_WORKSPACE_ROOT
AGENT_SRC_ROOT=$AGENT_SRC_ROOT
AGENT_WORKTREE_ROOT=$AGENT_WORKTREE_ROOT
AGENT_RUNTIME_ROOT=$AGENT_RUNTIME_ROOT
AGENT_ARTIFACT_ROOT=$AGENT_ARTIFACT_ROOT
AGENT_LOG_ROOT=$AGENT_LOG_ROOT
MCP_TRANSPORT=$MCP_TRANSPORT
MCP_TIMEOUT_MS=$MCP_TIMEOUT_MS
MCP_MAX_CONCURRENCY=$MCP_MAX_CONCURRENCY
AGENT_EXEC_MODE=$AGENT_EXEC_MODE
AGENT_PLATFORM=$AGENT_PLATFORM
AGENT_DEBUG=$AGENT_DEBUG
PYTHONPATH=$PYTHONPATH
EOF

echo "[env] setup complete"

#!/usr/bin/env bash
set -euo pipefail

BRANCH="${1:-}"

if [ -z "$BRANCH" ]; then
    echo "Usage: ./worktree_init.sh <branch>"
    exit 1
fi

git rev-parse --is-inside-work-tree >/dev/null 2>&1 || {
    echo "[worktree] not a git repo"
    exit 1
}

if ! git show-ref --verify --quiet "refs/heads/$BRANCH"; then
    echo "[worktree] branch does not exist locally: $BRANCH"
    exit 1
fi

TARGET=".worktrees/$BRANCH"

git worktree add "$TARGET" "$BRANCH"

cd "$TARGET"
bash ../setup_env.sh

echo "[worktree] ready: $TARGET"
'''

[cleanup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

echo "[cleanup] flushing runtime + artifacts"

rm -rf "$ROOT/runtime"/*
rm -rf "$ROOT/artifacts"/*
rm -rf "$ROOT/logs"/*

# Cross-platform process cleanup
if command -v pkill >/dev/null 2>&1; then
    pkill -f "agent" || true
fi

echo "[cleanup] done"
'''

[[actions]]
name = "Tools"
icon = "tool"
command = '''
#!/usr/bin/env bash
set -euo pipefail
echo "[action] TOOL"
python -m app.tools.runtime "$@"
'''

[[actions]]
name = "Run"
icon = "run"
command = '''
#!/usr/bin/env bash
set -euo pipefail
echo "[action] RUN"
python -m app.control.run_daily
'''

[[actions]]
name = "Debug"
icon = "debug"
command = '''
#!/usr/bin/env bash
set -euo pipefail
echo "[action] DEBUG"
export AGENT_DEBUG=1
python -m app.control.run_daily
'''

[[actions]]
name = "Test"
icon = "test"
command = '''
#!/usr/bin/env bash
set -euo pipefail
echo "[action] TEST"
pytest -v
'''
