version: '3.8'

services:
  mcp-knowledge-graph:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "5100:5100"
    volumes:
      - ./documents:/app/documents
      - ./memory:/app/memory
    environment:
      - WORKSPACE=/app
      - LOG_LEVEL=INFO
    command: python -m app.mcp_knowledge_graph.server /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - knowledge-graph

  web-backend:
    build:
      context: .
      dockerfile: Dockerfile.web-backend
    ports:
      - "8001:8001"
    volumes:
      - ./documents:/app/documents
      - ./memory:/app/memory
    environment:
      - WORKSPACE=/app
      - MCP_SERVER_URL=http://mcp-knowledge-graph:5100
      - LOG_LEVEL=INFO
    depends_on:
      mcp-knowledge-graph:
        condition: service_healthy
    command: python -m app.web_ui.backend.app /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - knowledge-graph

  web-frontend:
    build:
      context: app/web_ui/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://127.0.0.1:8001
    depends_on:
      - web-backend
    networks:
      - knowledge-graph

  agent-shell-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents
      - ./memory:/app/memory
      - ./queue:/app/queue
      - ./receipts:/app/receipts
    environment:
      - WORKSPACE=/app
      - MCP_SERVER_URL=http://mcp-knowledge-graph:5100
      - LOG_LEVEL=INFO
    depends_on:
      - mcp-knowledge-graph
      - web-backend
    command: uvicorn runtime.api:create_app --factory --host 0.0.0.0 --port 8000
    networks:
      - knowledge-graph

networks:
  knowledge-graph:
    driver: bridge
