name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      # Fixed to map correctly to the 'meta' step's output variable
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps: # Only defined once
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Build Cloud (optional)
        if: ${{ vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v4
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: ghcr.io/${{ github.repository }}:${{ needs.build.outputs.image_tag }}
          output: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Deploy to staging
        run: echo "Deploying ghcr.io/${{ github.repository }}:${{ needs.build.outputs.image_tag }} to staging"

      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            if curl -f https://staging-api.example.com/health; then
              echo "✅ Staging deployment healthy"
              exit 0
            fi
            echo "Waiting for deployment... ($i/30)"
            sleep 5
          done
          echo "❌ Deployment health check failed"
          exit 1
