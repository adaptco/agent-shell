name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: Install build/test deps
        run: python -m pip install --upgrade pip setuptools wheel build ruff pytest pytest-cov -q

      - name: Install package
        run: python -m pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (pytest)
        run: python -m pytest -q --maxfail=1 --disable-warnings --color=no

import argparse
import uvicorn
from runtime.config import load_config


def main(argv=None) -> int:
    cfg = load_config()
    parser = argparse.ArgumentParser(prog="agent-shell-api")
    parser.add_argument("--host", default=cfg.get("service", {}).get("host", "127.0.0.1"))
    parser.add_argument("--port", type=int, default=cfg.get("service", {}).get("port", 0))
    parser.add_argument("--reload", action="store_true")
    args = parser.parse_args(argv)

    try:
        uvicorn.run(
            "runtime.api:create_app",
            factory=True,
            host=args.host,
            port=args.port,
            reload=args.reload,
        )
    except OSError as e:
        if (
            (args.port != 0 and "address already in use" in str(e).lower())
            or "10048" in str(e)
        ):
            print(
                f"Port {args.port} is already in use. Retrying with auto-assigned port...",
                flush=True,
            )
            uvicorn.run(
                "runtime.api:create_app",
                factory=True,
                host=args.host,
                port=0,
                reload=args.reload,
            )
        else:
            raise

    return 0


if __name__ == "__main__":
    raise SystemExit(main())
