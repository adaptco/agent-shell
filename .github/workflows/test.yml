name: test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=runtime --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Build Cloud (optional)
        if: ${{ vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: agent-shell:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-container -p 8000:8000 agent-shell:test
          for i in {1..12}; do
            if curl -sf http://localhost:8000/healthz; then
              echo "✅ Container healthy"
              docker stop test-container
              exit 0
            fi
            echo "Waiting for container... ($i/12)"
            sleep 5
          done
          echo "❌ Container health check failed"
          docker logs test-container
          docker stop test-container || true
          exit 1

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: agent-shell:test
          only-severities: critical,high
          exit-code: false

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
