name: Run Tests

on: [push, pull_request]

name: Set up Python
    uses: actions/setup-python@v5
    with:
        python-version: '3.13'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run tests with coverage
        run: python -m pytest --cov=runtime --cov-report=xml --cov-report=term -q

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.image_tag }}
      dockerfile-present: ${{ steps.dockerfile-check.outputs.present }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile presence
        id: dockerfile-check
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tag
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Build Cloud (optional)
        if: ${{ steps.dockerfile-check.outputs.present == 'true' && vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Build Docker image
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip Docker checks (Dockerfile missing)
        if: ${{ steps.dockerfile-check.outputs.present != 'true' }}
        run: echo "No Dockerfile found in this branch. Skipping Docker build and scout checks."

  docker-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ needs.docker-build.outputs.dockerfile-present == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: agent-shell:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-container -p 8000:8000 agent-shell:test
          sleep 5
          if ! curl -f http://localhost:8000/health; then
            docker stop test-container
            false
          fi
          docker stop test-container
