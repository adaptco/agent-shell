name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: Install build/test deps
        run: python -m pip install --upgrade pip setuptools wheel build ruff pytest pytest-cov -q

      - name: Install package
        run: python -m pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests (pytest)
        run: python -m pytest -q --maxfail=1 --disable-warnings --color=no
