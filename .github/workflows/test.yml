name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Try to install editable package; tolerate failure if pyproject requires build isolation
          pip install -e . || true
          # Install dev/test requirements when present
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      dockerfile-present: ${{ steps.dockerfile-check.outputs.present }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile presence
        id: dockerfile-check
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Build Cloud (optional)
        if: ${{ steps.dockerfile-check.outputs.present == 'true' && vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Build Docker image
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Skip Docker checks (Dockerfile missing)
        if: ${{ steps.dockerfile-check.outputs.present != 'true' }}
        run: echo "No Dockerfile found in this branch. Skipping Docker build and scout checks."

  docker-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ needs.docker-build.outputs.dockerfile-present == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: agent-shell:test
          cache-from: type=gha

      - name: Run container health check
        run: |
          docker run -d --name test-container -p 8000:8000 agent-shell:test
          for i in {1..12}; do
            if curl -sf http://localhost:8000/healthz; then
              echo "✅ Container healthy"
              docker stop test-container
              exit 0
            fi
            echo "Waiting for container... ($i/12)"
            sleep 5
          done
          echo "❌ Container health check failed"
          docker logs test-container
          docker stop test-container
          exit 1
