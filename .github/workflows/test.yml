name: build-and-push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_run:
    workflows: [test]
    types: [completed]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: |
          echo "Image pushed with digest: ${{ steps.docker_build.outputs.digest }}"
name: deploy-production

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g., v1.2.3 or sha-abc123)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate image exists
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
        run: |
          TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          IMAGE_URL="ghcr.io/${{ github.repository }}:${IMAGE_TAG}"

          if docker manifest inspect "$IMAGE_URL"; then
            echo "✅ Image exists: $IMAGE_URL"
          else
            echo "❌ Image not found: $IMAGE_URL"
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://api.example.com

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:${IMAGE_TAG}"
          echo "🚀 Deploying to production: $IMAGE"

          # Example: SSH deployment with health checks
          # mkdir -p ~/.ssh
          # echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          # chmod 600 ~/.ssh/id_rsa
          # ssh -i ~/.ssh/id_rsa "$DEPLOY_USER@$DEPLOY_HOST" \
          #   "cd /app && \
          #    export IMAGE_TAG=${IMAGE_TAG} && \
          #    docker-compose pull && \
          #    docker-compose up -d && \
          #    docker-compose exec -T agent-shell-api curl -f http://localhost:8000/healthz"

      - name: Health check
        run: |
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -sf https://api.example.com/healthz; then
              echo "✅ Production deployment healthy"
              exit 0
            fi
            echo "⏳ Waiting for production... ($attempt/$max_attempts)"
            sleep 10
            attempt=$((attempt + 1))
          done
          echo "❌ Health check failed"
          exit 1

      - name: Smoke tests
        run: |
          echo "Running production smoke tests..."
          # Example smoke tests
          # curl -f https://api.example.com/api/status
          # curl -f -X POST https://api.example.com/api/test -H "Content-Type: application/json" -d '{"test": true}'

      - name: Notify deployment success
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            github.rest.releases.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.runId,
              body: `✅ Successfully deployed ${tag} to production`
            }).catch(() => {
              console.log('Release not found, skipping comment');
            });

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: production

    steps:
      - name: Alert oncall
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Production deployment failed - manual rollback required`,
              body: `Production deployment failed and requires manual intervention.\n\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nTag/Image: ${{ github.event.inputs.image_tag || github.ref_name }}`
            })

      - name: Initiate rollback process
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          echo "🔄 Production deployment failed. Manual rollback required."
          echo "Contact: oncall team"
          exit 1
name: deploy-staging

on:
  workflow_run:
    workflows: [build-and-push]
    branches: [main]
    types: [completed]
  pull_request:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://staging-api.example.com

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          echo "Deploying image: ghcr.io/${{ github.repository }}:${IMAGE_TAG}"
          # Example: SSH deployment
          # mkdir -p ~/.ssh
          # echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          # chmod 600 ~/.ssh/id_rsa
          # ssh -i ~/.ssh/id_rsa "$DEPLOY_USER@$DEPLOY_HOST" "cd /app && docker-compose pull && docker-compose up -d"

      - name: Wait for deployment
        run: |
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -sf https://staging-api.example.com/healthz; then
              echo "✅ Staging deployment healthy after $attempt attempts"
              exit 0
            fi
            echo "⏳ Waiting for deployment... ($attempt/$max_attempts)"
            sleep 5
            attempt=$((attempt + 1))
          done
          echo "❌ Deployment health check failed after $max_attempts attempts"
          exit 1

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging..."
          # Add your smoke test commands here
          # Example: curl -f https://staging-api.example.com/api/status

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment: staging

    steps:
      - name: Rollback deployment
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
        run: |
          echo "Rolling back staging deployment..."
          # Example: SSH rollback command
          # ssh -i ~/.ssh/id_rsa "$DEPLOY_USER@$DEPLOY_HOST" "cd /app && docker-compose down"
          echo "Rollback initiated (configure with your deployment details)"

      - name: Create issue for failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Staging deployment failed - ${context.runId}`,
              body: `Deployment failed and was rolled back.\n\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Compute image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Build Cloud (optional)
        if: ${{ vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v4
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate SBOM
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: ghcr.io/${{ github.repository }}:${{ needs.build.outputs.image-tag }}
          only-packages: all
          output: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Deploy to staging
        run: echo "Deploying ghcr.io/${{ github.repository }}:${{ needs.build.outputs.image-tag }} to staging"

      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            if curl -f https://staging-api.example.com/health; then
              echo "✅ Staging deployment healthy"
              exit 0
            fi
            echo "Waiting for deployment... ($i/30)"
            sleep 5
          done
          echo "❌ Deployment health check failed"
          exit 1
name: release

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should-release: ${{ steps.check.outputs.should-release }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION already exists"
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Tag v$VERSION does not exist - will create release"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Cleaned up spacing string format

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build

      - name: Create Git tag and release (with artifacts)
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "$TAG"
          git push origin "$TAG"
          
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --target main

  notify:
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: always()

    steps:
      - name: Release created
        if: success()
        run: echo "✅ Release v${{ needs.check-version.outputs.version }} created successfully"

      - name: No release needed
        if: failure()
        run: echo "ℹ️ No new release (version unchanged or tag already exists)"
name: test

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e . || true
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Create state directory
        run: mkdir -p state && echo '{}' > state/runtime.json
      - name: Run tests with coverage
        run: pytest --cov=runtime --cov-report=xml --cov-report=term -q

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.image_tag }}
      dockerfile-present: ${{ steps.dockerfile-check.outputs.present }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check Dockerfile presence
        id: dockerfile-check
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tag
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Build Cloud (optional)
        if: ${{ steps.dockerfile-check.outputs.present == 'true' && vars.ENABLE_DOCKER_BUILD_CLOUD == 'true' }}
        uses: docker/setup-buildx-action@v4
        with:
          driver-options: |
            image=moby/buildkit:latest
            network=docker-bake

      - name: Build Docker image
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Docker Scout
        if: ${{ steps.dockerfile-check.outputs.present == 'true' }}
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}:latest
          only-severities: critical,high
          exit-code: false

      - name: Skip Docker checks (Dockerfile missing)
        if: ${{ steps.dockerfile-check.outputs.present != 'true' }}
        run: echo "No Dockerfile found in this branch. Skipping Docker build checks."

  docker-test:
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ needs.docker-build.outputs.dockerfile-present == 'true' }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: agent-shell:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check
        run: |
          docker run -d --name test-container -p 8000:8000 agent-shell:test
          sleep 5
          if ! curl -f http://localhost:8000/ping; then
            docker stop test-container
            exit 1
          fi
          docker stop test-container
