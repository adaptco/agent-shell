name: release

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should-release: ${{ steps.check.outputs.should-release }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0 # Required so git can see all tags for the version check

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          # Fetch tags explicitly to ensure git rev-parse can find them
          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "❌ Tag v$VERSION already exists"
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Tag v$VERSION does not exist - will create release"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Cleaned up spacing string format

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m build

      - name: Create Git tag and release (with artifacts)
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag "$TAG"
          git push origin "$TAG"
          
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            --target main \
            dist/*

  notify:
    runs-on: ubuntu-latest
    needs: [check-version, create-release]
    if: always()

    steps:
      # Triggers if create-release succeeded
      - name: Release created
        if: needs.create-release.result == 'success'
        run: echo "✅ Release v${{ needs.check-version.outputs.version }} created successfully"

      # Triggers if check-version failed OR create-release actually failed
      - name: Workflow failed
        if: needs.check-version.result == 'failure' || needs.create-release.result == 'failure'
        run: echo "❌ Workflow failed during execution"

      # Triggers if check-version succeeded but determined no release was needed
      - name: No release needed
        if: needs.check-version.result == 'success' && needs.check-version.outputs.should-release == 'false'
        run: echo "ℹ️ No new release (version unchanged or tag already exists)"
